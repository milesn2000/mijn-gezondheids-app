<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Workout Tracker</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="app.js" defer></script>
        <link rel="manifest" href="manifest.json">
    </head>
    <body>
        <header>
            <h1>workout tracker</h1>
            <nav>
                <a href="index.html" data-nl="dashboard" data-en="dashboard">dashbord</a>
                <a href="invoer.html" data-nl="nieuwe Workout" data-en="new Workout">nieuwe Workout</a>
                <a href="overzicht.html" data-nl="overzicht" data-en="overview">overzicht</a>
                <button id="taalswitch">EN</button>
            </nav>
        </header>



        <main class="index">
            <!-- sammenvatting vandaag -->
            <section>
                <h2 data-nl="vandaag" data-en="today">Vandaag</h2>
                <p data-nl="wourkout" data-en="workout">Workout: 0</p>
                <p data-nl="duur: 0 minuten" data-en="duration: 0 minutes">duur: 0 minuten</p>

            </section>

            <!-- samenvatting week -->
            <section>
                <h2 data-nl="week" data-en="week">Week</h2>
                <p data-nl="wourkout: 0" data-en="workout: 0">Workouts: 0</p>
                <p data-nl="duur: 0 minuten" data-en="duration: 0 minutes">duur: 0 minuten</p>  
            </section>

            <!-- groote button om nieuwe workout te maken -->
            <a href="invoer.html" data-nl="nieuwe Workout" data-en="new Workout" class="button-link">Workout toevoegen</a>
        </main>



        <footer>
            <p>Miles Nouwens</p> <!-- naam -->
            <p>IHO25S1A 2026</p> <!-- klas/jaar -->
        </footer>









    </body>
</html>
